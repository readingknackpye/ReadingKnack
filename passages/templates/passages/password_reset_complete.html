{% extends "base.html" %}
{% block title %}Password Updated{% endblock %}
{% block content %}
<section style="max-width:760px;margin:0 auto;padding:120px 20px 70px;">
  <div style="background:rgba(255,255,255,0.95);border:1px solid rgba(186,230,253,0.95);border-radius:28px;padding:30px;box-shadow:0 24px 50px rgba(10,37,64,0.12);">
    <h1 style="margin:0 0 10px;font-family:'Fredoka',sans-serif;color:#0f172a;">Password Updated</h1>
    <p style="color:#64748b;line-height:1.7;">Your password has been changed. You can log in with the new password now.</p>
    <a href="{% url 'login' %}" style="display:inline-flex;margin-top:8px;padding:12px 16px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9 0%,#2563eb 100%);color:#fff;text-decoration:none;font-weight:800;">Return to Login</a>
  </div>
</section>
{% endblock %}
